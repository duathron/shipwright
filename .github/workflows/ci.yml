name: CI
on:
  push:
  pull_request:

jobs:
  ci:
    # Dogfood: Shipwright's CI runs the framework's own reusable workflow.
    uses: ./.github/workflows/python-ci.yml
    with:
      run-build: true

  # Type gate — mypy over the library (config in pyproject [tool.mypy]).
  types:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: uv sync --dev
      - run: uv run mypy

  # Template self-test (G11/G8): render the Copier template into a throwaway
  # project and run THAT project's own QA gate (sync + lint + format-check + tests
  # + offline dogfood). Proves the scaffolder emits a working, QA-passing project
  # end-to-end, for both pack presets. Needs network (generated project pulls
  # shipwright-kit from git).
  template-selftest:
    name: Template self-test (scaffold + QA gate)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        preset: [none, security]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: uv sync --dev
      - run: bash scripts/template-selftest.sh ${{ matrix.preset }}

  # Supply-chain: generate a CycloneDX SBOM of the build env on every CI run
  # (demonstrable now; the release pipeline attaches one at publish time too).
  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: uv sync --dev
      - run: uvx --from cyclonedx-bom cyclonedx-py environment --output-format JSON --output-file sbom.cdx.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
