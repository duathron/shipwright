name: Reusable Python CI

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to test against"
        type: string
        default: "3.11"
      working-directory:
        description: "Directory of the project to build/test"
        type: string
        default: "."
      run-build:
        description: "Whether to run 'uv build' (set false for non-package repos)"
        type: boolean
        default: true

jobs:
  lint-and-test:
    name: Lint, test${{ inputs.run-build && ', build' || '' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - name: Version consistency
        # Guard against pyproject [project].version drifting from a package
        # __version__ literal (e.g. a release that bumps pyproject.toml but not
        # __init__.py). Generic across the fleet; no-op for repos with a dynamic
        # or absent version, or with no __version__ literal. Runs on the bare
        # checkout (system python3 only) before any dependency install.
        run: |
          python3 - <<'PYEOF'
          import tomllib, pathlib, re, sys
          proj = tomllib.load(open("pyproject.toml", "rb")).get("project", {})
          ver = proj.get("version")
          if not ver:
              print("No static [project].version (dynamic or absent) — skipping.")
              sys.exit(0)
          bad = []
          for p in pathlib.Path(".").rglob("__init__.py"):
              if any(x in p.parts for x in (".venv", "build", "dist", "tests")):
                  continue
              m = re.search(r'^__version__\s*=\s*["\']([^"\']+)["\']', p.read_text(), re.M)
              if m and m.group(1) != ver:
                  bad.append(f"{p}: __version__={m.group(1)} != pyproject {ver}")
          if bad:
              print("Version drift:\n  " + "\n  ".join(bad)); sys.exit(1)
          print(f"Version consistent: {ver}")
          PYEOF
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - name: Set up Python
        run: uv python install ${{ inputs.python-version }}
      - name: Sync dev environment
        run: uv sync --dev
      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Test
        run: uv run pytest -q
      - name: Build
        if: ${{ inputs.run-build }}
        run: uv build
