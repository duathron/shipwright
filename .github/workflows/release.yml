name: Release
# Harden + prove phase: release-please ONLY (opens a release PR on conventional
# commits). NO publish job is wired here — there is no path to PyPI from this
# workflow. Wiring the full python-release.yml (build + OIDC publish) is a
# separate, operator-gated step done only when actually publishing.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release PR
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
