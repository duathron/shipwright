name: Reusable Python Release

on:
  workflow_call:
    inputs:
      release-environment:
        description: "GitHub Environment gating publish (required reviewers = QM/beta gate)"
        type: string
        default: "pypi"
      prerelease:
        description: "Publish as a pre-release (PyPI pre-release tags, e.g. 1.6.0b1)"
        type: boolean
        default: false
      config-file:
        description: "Path to the release-please config file (relative to consumer repo root)"
        type: string
        default: "release-please-config.json"
      manifest-file:
        description: "Path to the release-please manifest file (relative to consumer repo root)"
        type: string
        default: ".release-please-manifest.json"

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release PR / tag
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071  # v4
        id: rp
        with:
          config-file: ${{ inputs.config-file }}
          manifest-file: ${{ inputs.manifest-file }}

  publish:
    name: Build + publish to PyPI (OIDC)
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.release-environment }}
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - name: Build distributions
        run: uv build
      - name: Generate CycloneDX SBOM
        run: uvx --from cyclonedx-bom cyclonedx-py environment --output-format JSON --output-file sbom.cdx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          skip-existing: ${{ inputs.prerelease }}
          attestations: true
