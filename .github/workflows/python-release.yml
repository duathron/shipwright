name: Reusable Python Release

on:
  workflow_call:
    inputs:
      release-environment:
        description: "GitHub Environment gating publish (required reviewers = QM/beta gate)"
        type: string
        default: "pypi"
      prerelease:
        description: "Publish as a pre-release (PyPI pre-release tags, e.g. 1.6.0b1)"
        type: boolean
        default: false
      config-file:
        description: "Path to the release-please config file (relative to consumer repo root)"
        type: string
        default: "release-please-config.json"
      manifest-file:
        description: "Path to the release-please manifest file (relative to consumer repo root)"
        type: string
        default: ".release-please-manifest.json"

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release PR / tag
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: ${{ inputs.config-file }}
          manifest-file: ${{ inputs.manifest-file }}

  publish:
    name: Build + publish to PyPI (OIDC)
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.release-environment }}
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
      - name: Build distributions
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: ${{ inputs.prerelease }}
