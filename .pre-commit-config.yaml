repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files
  # Secret-hygiene gate — mandatory because the repo is public/distributable.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  # Bundle-drift gate — keeps shipwright/personas/ in sync with the vault SSOT.
  # Local hook; no-op where the vault isn't mounted (CI, fresh clones).
  - repo: local
    hooks:
      - id: bundle-drift
        name: persona bundle drift vs vault SSOT
        entry: sh scripts/check-bundle-drift.sh
        language: system
        always_run: true
        pass_filenames: false
